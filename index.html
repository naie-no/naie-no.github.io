    <!-- 1. ADD THIS SCRIPT HERE TO UNPACK THE URL -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var targetPath = params.get('p');
        if (targetPath) {
          // Reconstruct the original search and hash if they exist
          var targetSearch = params.get('q') ? decodeURIComponent(params.get('q')) : '';
          var hash = window.location.hash || '';
          
          // Clean the URL bar back to /no/about (or whatever it was)
          window.history.replaceState(null, null, targetPath + targetSearch + hash);
        }
      })();
    </script>
